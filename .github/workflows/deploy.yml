name: Deploy to EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-backend
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 🔍 DEBUG - Check Metadata & Connectivity
        env:
          HOSTNAME: ${{ secrets.EC2_HOST }}
          USER_NAME: ${{ secrets.EC2_USER }}
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "=== DEBUG INFORMATION ==="
          echo "Target Host: $HOSTNAME"
          echo "User Name: $USER_NAME"
          
          if [ -z "$HOSTNAME" ]; then echo "❌ Missing EC2_HOST secret!"; exit 1; fi
          if [ -z "$USER_NAME" ]; then echo "❌ Missing EC2_USER secret!"; exit 1; fi
          if [ -z "$SSH_KEY" ]; then echo "❌ Missing EC2_SSH_KEY secret!"; exit 1; fi
          
          echo "SSH Key length: $(echo -n "$SSH_KEY" | wc -c) characters"
          echo "SSH Key first line: $(echo "$SSH_KEY" | head -n 1)"
          echo "SSH Key last line: $(echo "$SSH_KEY" | tail -n 1)"
          
          if [[ "$SSH_KEY" != *"BEGIN"* ]]; then
            echo "❌ ERROR: Private Key format is invalid (Missing BEGIN header)!"
          fi
          
          echo "Testing latency to host..."
          ping -c 3 $HOSTNAME || echo "⚠️ Ping failed (Normal if ICMP is blocked in Security Group)"
          
          echo "Checking if SSH port (22) is open..."
          nc -zv -w5 $HOSTNAME 22 || echo "❌ PORT 22 IS CLOSED OR UNREACHABLE!"
          echo "========================="

      - name: Create .env file
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          {
            echo "BACKEND_IMAGE=${{ env.REGISTRY }}/${REPO}-backend:latest"
            echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}"
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
            echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}"
            echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}"
            echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}"
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}"
            echo "ENVIRONMENT=production"
            echo "PYTHONPATH=/app"
          } > .env

      - name: 🚀 SCP Transfer (with Debug)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          debug: true
          source: ".env,docker-compose.yml"
          target: "~/app"

      - name: 💻 SSH Execution (with Debug)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          debug: true
          script: |
            cd ~/app
            echo "Current User: $(whoami)"
            echo "📥 Pulling images..."
            sudo docker compose pull
            echo "🐘 Starting DB & Redis..."
            sudo docker compose up -d db redis
            sleep 15
            echo "🔄 Running Migrations..."
            sudo docker compose run --rm backend alembic upgrade head
            echo "🚀 Starting all services..."
            sudo docker compose up -d
            sudo docker image prune -f
            echo "✨ DEPLOY SUCCESSFUL!"
