name: Deploy to EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo name
        run: |
          echo "IMAGE_NAME=${{ env.REGISTRY }}/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')-backend" >> $GITHUB_ENV

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file from Single Secret
        run: |
          echo "${{ secrets.ENV_CONFIG }}" > .env
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          sed -i '/BACKEND_IMAGE/d' .env 
          echo "BACKEND_IMAGE=${{ env.REGISTRY }}/${REPO}-backend:latest" >> .env
          echo "PYTHONPATH=/app" >> .env

      - name: 🚀 Final Deploy via Native SSH
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOSTNAME: ${{ secrets.EC2_HOST }}
          USER_NAME: ${{ secrets.EC2_USER }}
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY_USER: ${{ github.actor }}
        run: |
          mkdir -p ~/.ssh
          echo "$PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Chuẩn bị tên Image viết thường
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG="ghcr.io/${REPO}-backend:latest"
          
          echo "📡 Kết nối tới $HOSTNAME..."
          # Kiểm tra kết nối trước
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i ~/.ssh/id_rsa $USER_NAME@$HOSTNAME "mkdir -p ~/app" || (echo "❌ Không thể kết nối SSH. Vui lòng Reboot server nếu bị treo!" && exit 1)
          
          echo "📤 Đăng chuyển file cấu hình..."
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa .env docker-compose.yml $USER_NAME@$HOSTNAME:~/app/
          
          echo "⚙️ Bắt đầu thực thi lệnh trên Server..."
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa $USER_NAME@$HOSTNAME env BACKEND_IMAGE=$IMAGE_TAG REGISTRY_USER=$REGISTRY_USER REGISTRY_PASSWORD=$REGISTRY_PASSWORD 'bash -s' << 'EOF'
            set -e
            cd ~/app
            
            # 1. Giải phóng RAM tuyệt đối
            echo "🧹 Dọn dẹp RAM: Tắt toàn bộ hệ thống..."
            sudo docker compose down --remove-orphans || true
            sudo docker system prune -f
            
            # 2. Đăng nhập và Pull (Dùng biến đã truyền qua env)
            echo "$REGISTRY_PASSWORD" | sudo docker login ghcr.io -u "$REGISTRY_USER" --password-stdin
            echo "📥 Đang tải Image mới: $BACKEND_IMAGE"
            sudo docker compose pull
            
            # 3. Khởi động THẬT CHẬM để tránh treo CPU
            echo "� 1. Khởi động Database & Redis..."
            sudo docker compose up -d db redis
            echo "⏳ Nghỉ 20 giây đợi DB..."
            sleep 20
            
            echo "🔄 2. Chạy Migration..."
            sudo docker compose run --rm backend alembic upgrade head || echo "⚠️ Migration có thể đã chạy rồi."
            
            echo "⚙️ 3. Khởi động Backend (Nặng nhất)..."
            sudo docker compose up -d backend
            echo "⏳ Nghỉ 30 giây để nạp thư viện Pandas..."
            sleep 30
            
            echo "🤖 4. Khởi động các dịch vụ còn lại..."
            sudo docker compose up -d telegram_bot celery_worker celery_beat
            
            echo "✅ Kiểm tra trạng thái cuối:"
            sudo docker compose ps
            free -m
            sudo docker logout ghcr.io
            echo "🚀 DEPLOY HOÀN TẤT!"
          EOF
