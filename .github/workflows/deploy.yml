name: Deploy to EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-backend
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH and Deploy
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOSTNAME: ${{ secrets.EC2_HOST }}
          USER_NAME: ${{ secrets.EC2_USER }}
        run: |
          # 1. Setup SSH
          mkdir -p ~/.ssh
          printf "%s" "$PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $HOSTNAME >> ~/.ssh/known_hosts || true
          
          # 2. Tạo file .env bằng printf (an toàn nhất cho YAML)
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          printf "BACKEND_IMAGE=${{ env.REGISTRY }}/${REPO}-backend:latest\n" > .env
          printf "POSTGRES_USER=${{ secrets.POSTGRES_USER }}\n" >> .env
          printf "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}\n" >> .env
          printf "POSTGRES_DB=${{ secrets.POSTGRES_DB }}\n" >> .env
          printf "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}\n" >> .env
          printf "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}\n" >> .env
          printf "SECRET_KEY=${{ secrets.SECRET_KEY }}\n" >> .env
          printf "ENVIRONMENT=production\n" >> .env

          # 3. Deploy
          echo "🚀 Đang deploy tới $HOSTNAME..."
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa .env docker-compose.yml $USER_NAME@$HOSTNAME:~/app/
          
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa $USER_NAME@$HOSTNAME << 'EOF'
            mkdir -p ~/app
            cd ~/app
            docker compose pull
            docker compose up -d db redis
            sleep 15
            docker compose run --rm backend alembic upgrade head
            docker compose up -d
            docker image prune -f
            echo "✅ DEPLOY SUCCESSFUL!"
          EOF
