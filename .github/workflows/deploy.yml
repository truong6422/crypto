name: Deploy to EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-backend
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file from Single Secret
        run: |
          # 1. Ghi toàn bộ nội dung từ secret ENV_CONFIG vào file
          echo "${{ secrets.ENV_CONFIG }}" > .env
          
          # 2. Tự động thêm/cập nhật BACKEND_IMAGE (để bạn không cần quan tâm phần này)
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          sed -i '/BACKEND_IMAGE/d' .env 
          echo "BACKEND_IMAGE=${{ env.REGISTRY }}/${REPO}-backend:latest" >> .env
          
          # 3. Đảm bảo PYTHONPATH luôn đúng
          echo "PYTHONPATH=/app" >> .env

      - name: 🚀 Final Deploy via Native SSH
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOSTNAME: ${{ secrets.EC2_HOST }}
          USER_NAME: ${{ secrets.EC2_USER }}
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "$PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          echo "📡 Kết nối tới $HOSTNAME..."
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa $USER_NAME@$HOSTNAME "mkdir -p ~/app"
          
          echo "📤 Đang chuyển file .env và docker-compose..."
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa .env docker-compose.yml $USER_NAME@$HOSTNAME:~/app/
          
          echo "⚙️ Đang thực thi lệnh trên Server..."
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa $USER_NAME@$HOSTNAME << 'EOF'
            cd ~/app
            
            # Kiểm tra Docker
            if ! [ -x "$(command -v docker)" ]; then
              sudo apt-get update && sudo apt-get install -y docker.io docker-compose-v2
              sudo usermod -aG docker $USER
            fi

            sudo docker compose pull
            sudo docker compose up -d db redis
            echo "Đang đợi DB khởi động..."
            sleep 15
            sudo docker compose run --rm backend alembic upgrade head
            sudo docker compose up -d
            sudo docker image prune -f
            echo "✨ DEPLOY THÀNH CÔNG!"
          EOF
