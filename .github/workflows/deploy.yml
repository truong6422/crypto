name: Deploy to EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-backend
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 🔍 DEBUG Connectivity
        env:
          HOSTNAME: ${{ secrets.EC2_HOST }}
          USER_NAME: ${{ secrets.EC2_USER }}
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "Checking Port 22 on $HOSTNAME..."
          nc -zv -w5 $HOSTNAME 22 || echo "❌ PORT 22 KHÔNG THÔNG!"
          
          if [[ "$SSH_KEY" != *"BEGIN"* ]]; then
            echo "❌ CẢNH BÁO: Private Key dán vào Secret đang bị SAI định dạng (thiếu Header BEGIN)!"
          fi
          
          echo "Key First Line: $(echo "$SSH_KEY" | head -n 1)"

      - name: Create .env file
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          {
            echo "BACKEND_IMAGE=${{ env.REGISTRY }}/${REPO}-backend:latest"
            echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}"
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
            echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}"
            echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}"
            echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}"
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}"
            echo "ENVIRONMENT=production"
            echo "PYTHONPATH=/app"
          } > .env

      - name: 🚀 Deploy via standard SSH Command
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOSTNAME: ${{ secrets.EC2_HOST }}
          USER_NAME: ${{ secrets.EC2_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          echo "Checking connection..."
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa $USER_NAME@$HOSTNAME "mkdir -p ~/app"
          
          echo "Copying files..."
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa .env docker-compose.yml $USER_NAME@$HOSTNAME:~/app/
          
          echo "Running remote commands..."
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa $USER_NAME@$HOSTNAME << 'EOF'
            cd ~/app
            sudo docker compose pull
            sudo docker compose up -d db redis
            sleep 10
            sudo docker compose run --rm backend alembic upgrade head
            sudo docker compose up -d
            sudo docker image prune -f
            echo "✅ DEPLOY TỪ LỆNH GỐC THÀNH CÔNG!"
          EOF
