name: Deploy to EC2 (Optimized)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase repo name
        run: |
          echo "REPO_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]' | cut -d'/' -f2)" >> $GITHUB_ENV
          echo "IMAGE_TAG=crypto-backend:latest" >> $GITHUB_ENV

      - name: Build Docker image locally
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true # Load image vào docker local của GitHub Runner thay vì push
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save and Compress Docker image
        run: |
          echo "📦 Đang nén Image..."
          docker save ${{ env.IMAGE_TAG }} | gzip > backend_image.tar.gz
          echo "✅ Đã nén thành backend_image.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: backend_image.tar.gz
          retention-days: 1

  deploy:
    needs: build-and-package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Create .env file
        run: |
          echo "${{ secrets.ENV_CONFIG }}" > .env
          echo "BACKEND_IMAGE=crypto-backend:latest" >> .env
          echo "PYTHONPATH=/app" >> .env

      - name: � Debug Environment & Artifacts
        run: |
          echo "📂 Kiểm tra file build artifacts:"
          ls -lh backend_image.tar.gz
          echo "🔑 Kiểm tra độ dài Secrets (đảm bảo không bị trống):"
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then echo "❌ EC2_SSH_KEY is EMPTY"; else echo "✅ EC2_SSH_KEY is set"; fi
          if [ -z "${{ secrets.EC2_HOST }}" ]; then echo "❌ EC2_HOST is EMPTY"; else echo "✅ EC2_HOST is set"; fi
          if [ -z "${{ secrets.EC2_USER }}" ]; then echo "❌ EC2_USER is EMPTY"; else echo "✅ EC2_USER is set"; fi

      - name: �🚀 Final Deploy via Docker Load
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOSTNAME: ${{ secrets.EC2_HOST }}
          USER_NAME: ${{ secrets.EC2_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Cấu hình SSH tối ưu cho network kém và debug sâu
          SSH_OPTS="-vv -o StrictHostKeyChecking=no -o ConnectTimeout=60 -o ServerAliveInterval=15 -o ServerAliveCountMax=3 -i ~/.ssh/id_rsa"
          
          echo "📡 [DEBUG] Đang thử kết nối tới $HOSTNAME..."
          ssh $SSH_OPTS $USER_NAME@$HOSTNAME "mkdir -p ~/app && echo '✅ Server phản hồi: Đã sẵn sàng thư mục app'"

          echo "📤 [DEBUG] Đang đẩy file lên Server (SCP -vv)..."
          scp $SSH_OPTS backend_image.tar.gz .env docker-compose.yml $USER_NAME@$HOSTNAME:~/app/
          
          echo "⚙️ [DEBUG] Đang thực thi lệnh nạp Image trên Server..."
          ssh $SSH_OPTS $USER_NAME@$HOSTNAME 'bash -s' << 'EOF'
            set -e
            cd ~/app
            
            echo "📥 1. Nạp Image vào hệ thống (Docker Load)..."
            gunzip -c backend_image.tar.gz | sudo docker load
            
            echo "🧹 2. Dọn dẹp: Tắt hệ thống cũ & Xóa file nén..."
            sudo docker compose down --remove-orphans || true
            rm backend_image.tar.gz
            
            echo "🗄️ 3. Khởi động Database & Redis..."
            sudo docker compose up -d db redis
            echo "⏳ Đợi 10s..."
            sleep 10
            
            echo "🔄 4. Chạy Migration..."
            sudo docker compose run --rm backend alembic upgrade head || echo "⚠️ Migration có thể đã chạy rồi."
            
            echo "⚙️ 5. Khởi động Backend..."
            sudo docker compose up -d backend
            echo "⏳ Đợi nạp Pandas..."
            sleep 30
            
            echo "🤖 6. Khởi động các dịch vụ còn lại..."
            sudo docker compose up -d celery_worker telegram_bot celery_beat
            
            echo "✅ Dọn dẹp rác..."
            sudo docker system prune -f
            
            echo "🚀 DEPLOY HOÀN TẤT!"
            sudo docker compose ps
          EOF
