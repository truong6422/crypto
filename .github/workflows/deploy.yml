name: Deploy to EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo name
        run: |
          echo "IMAGE_NAME=${{ env.REGISTRY }}/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')-backend" >> $GITHUB_ENV

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file from Single Secret
        run: |
          echo "${{ secrets.ENV_CONFIG }}" > .env
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          sed -i '/BACKEND_IMAGE/d' .env 
          echo "BACKEND_IMAGE=${{ env.REGISTRY }}/${REPO}-backend:latest" >> .env
          echo "PYTHONPATH=/app" >> .env

      - name: 🚀 Final Deploy via Native SSH
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOSTNAME: ${{ secrets.EC2_HOST }}
          USER_NAME: ${{ secrets.EC2_USER }}
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY_USER: ${{ github.actor }}
          # Truyền trực tiếp tên Image vào bước deploy để chắc chắn
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "$PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          B_IMAGE="${{ env.REGISTRY }}/${REPO}-backend:latest"
          
          echo "📡 Kết nối tới $HOSTNAME..."
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa $USER_NAME@$HOSTNAME "mkdir -p ~/app"
          
          echo "📤 Đang chuyển file .env và docker-compose..."
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa .env docker-compose.yml $USER_NAME@$HOSTNAME:~/app/
          
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa $USER_NAME@$HOSTNAME << EOF
            cd ~/app
            
            # 1. Tắt mọi thứ để giải phóng RAM (Cực kỳ quan trọng với t2.micro)
            echo "🧹 Giải phóng RAM: Tắt toàn bộ dịch vụ cũ..."
            sudo docker compose down --remove-orphans
            
            # 2. Xóa các image cũ và cache để tránh đầy ổ cứng
            sudo docker system prune -f
            
            # 3. Đăng nhập và Pull Image (Từng bước để tránh nghẽn I/O)
            echo "$REGISTRY_PASSWORD" | sudo docker login ghcr.io -u "$REGISTRY_USER" --password-stdin
            echo "📥 Đang tải Image mới: $B_IMAGE"
            BACKEND_IMAGE=$B_IMAGE sudo docker compose pull
            
            # 4. KHỞI ĐỘNG TUẦN TỰ (Sequential Startup)
            
            echo "🛢️ 1. Khởi động Database & Redis..."
            BACKEND_IMAGE=$B_IMAGE sudo docker compose up -d db redis
            sleep 15
            
            echo "🔄 2. Chạy Migration (Chạy xong rồi xóa container ngay để tiết kiệm RAM)..."
            BACKEND_IMAGE=$B_IMAGE sudo docker compose run --rm backend alembic upgrade head || echo "⚠️ Migration có cảnh báo."
            sleep 5
            
            echo "⚙️ 3. Khởi động Backend..."
            BACKEND_IMAGE=$B_IMAGE sudo docker compose up -d backend
            sleep 20
            
            echo "🤖 4. Khởi động Telegram Bot & Worker..."
            BACKEND_IMAGE=$B_IMAGE sudo docker compose up -d telegram_bot celery_worker celery_beat
            
            echo "✅ KIỂM TRA TÀI NGUYÊN:"
            free -m
            sudo docker compose ps
            
            echo "✨ DEPLOY HOÀN TẤT NHẸ NHÀNG!"
            sudo docker logout ghcr.io
          EOF
