name: Deploy to EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-backend
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH and Deploy
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOSTNAME: ${{ secrets.EC2_HOST }}
          USER_NAME: ${{ secrets.EC2_USER }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $HOSTNAME >> ~/.ssh/known_hosts || true
          
          # 1. Tạo file .env cục bộ với cú pháp an toàn
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          cat << EOF > .env
          BACKEND_IMAGE=${{ env.REGISTRY }}/${REPO}-backend:latest
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          ENVIRONMENT=production
          EOF
          
          # Xóa bỏ các khoảng trắng thừa ở đầu dòng trong file .env (do indent của YAML)
          sed -i 's/^[[:space:]]*//' .env

          # 2. Tạo thư mục và copy files lên EC2
          ssh -i ~/.ssh/id_rsa $USER_NAME@$HOSTNAME "mkdir -p ~/app"
          scp -i ~/.ssh/id_rsa .env docker-compose.yml $USER_NAME@$HOSTNAME:~/app/
          
          # 3. Thực thi deploy trên remote
          ssh -i ~/.ssh/id_rsa $USER_NAME@$HOSTNAME << 'REMOTEEFFECT'
            cd ~/app
            docker compose pull
            docker compose up -d db redis
            echo "Đang đợi database khởi động..."
            sleep 10
            docker compose run --rm backend alembic upgrade head
            docker compose up -d
            docker image prune -f
          REMOTEEFFECT
