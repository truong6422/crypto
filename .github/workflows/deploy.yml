name: Deploy to EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo name
        run: |
          echo "IMAGE_NAME=${{ env.REGISTRY }}/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')-backend" >> $GITHUB_ENV

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file from Single Secret
        run: |
          echo "${{ secrets.ENV_CONFIG }}" > .env
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          sed -i '/BACKEND_IMAGE/d' .env 
          echo "BACKEND_IMAGE=${{ env.REGISTRY }}/${REPO}-backend:latest" >> .env
          echo "PYTHONPATH=/app" >> .env

      - name: 🚀 Final Deploy via Native SSH
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOSTNAME: ${{ secrets.EC2_HOST }}
          USER_NAME: ${{ secrets.EC2_USER }}
          # Pass credentials for server login
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY_USER: ${{ github.actor }}
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "$PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          echo "📡 Kết nối tới $HOSTNAME..."
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa $USER_NAME@$HOSTNAME "mkdir -p ~/app"
          
          echo "📤 Đang chuyển file .env và docker-compose..."
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa .env docker-compose.yml $USER_NAME@$HOSTNAME:~/app/
          
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa $USER_NAME@$HOSTNAME << EOF
            set -e
            cd ~/app
            
            # 1. Đăng nhập vào Registry ngay trên server (BẮT BUỘC để pull bản mới)
            echo "$REGISTRY_PASSWORD" | sudo docker login ghcr.io -u "$REGISTRY_USER" --password-stdin

            # 2. Dọn dẹp sạch sẽ để tránh xung đột hoặc đầy đĩa
            echo "🧹 Đang dọn dẹp hệ thống..."
            sudo docker compose down --remove-orphans
            sudo docker system prune -af
            
            # 3. Ép tải Image mới nhất
            echo "📥 Đang tải Image mới: \$BACKEND_IMAGE"
            sudo docker compose pull
            
            echo "🔄 Cập nhật database..."
            sudo docker compose up -d db redis
            sleep 10
            sudo docker compose run --rm backend alembic upgrade head
            
            echo "🚀 Khởi động dịch vụ mới..."
            sudo docker compose up -d --force-recreate
            
            echo "✨ DEPLOY HOÀN TẤT!"
            sudo docker logout ghcr.io
          EOF
