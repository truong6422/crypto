name: Deploy to EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo name
        run: |
          echo "IMAGE_NAME=${{ env.REGISTRY }}/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')-backend" >> $GITHUB_ENV

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file from Single Secret
        run: |
          echo "${{ secrets.ENV_CONFIG }}" > .env
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          sed -i '/BACKEND_IMAGE/d' .env 
          echo "BACKEND_IMAGE=${{ env.REGISTRY }}/${REPO}-backend:latest" >> .env
          echo "PYTHONPATH=/app" >> .env

      - name: 🚀 Final Deploy via Native SSH
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOSTNAME: ${{ secrets.EC2_HOST }}
          USER_NAME: ${{ secrets.EC2_USER }}
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "$PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          echo "📡 Kết nối tới $HOSTNAME..."
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa $USER_NAME@$HOSTNAME "mkdir -p ~/app"
          
          echo "📤 Đăng chuyển file .env và docker-compose..."
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa .env docker-compose.yml $USER_NAME@$HOSTNAME:~/app/
          
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa $USER_NAME@$HOSTNAME << 'EOF'
            set -e
            cd ~/app
            
            # Đảm bảo có Docker
            if ! [ -x "$(command -v docker)" ]; then
              sudo apt-get update && sudo apt-get install -y docker.io docker-compose-v2
              sudo usermod -aG docker $USER
            fi

            # Dọn dẹp trước để tránh đầy đĩa
            sudo docker system prune -f
            
            echo "📥 Đang tải Image mới: $BACKEND_IMAGE"
            # Ép pull image mới nhất
            sudo docker compose pull
            
            echo "🔄 Cập nhật database..."
            sudo docker compose up -d db redis
            sleep 10
            sudo docker compose run --rm backend alembic upgrade head
            
            echo "🚀 Khởi động dịch vụ mới..."
            # Sử dụng --force-recreate để đảm bảo code mới được nạp
            sudo docker compose up -d --force-recreate
            
            # Xóa các image cũ "dangling"
            sudo docker image prune -f
            echo "✨ DEPLOY HOÀN TẤT!"
          EOF
