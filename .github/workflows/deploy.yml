name: Deploy to EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo name
        run: |
          echo "IMAGE_NAME=${{ env.REGISTRY }}/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')-backend" >> $GITHUB_ENV

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file from Single Secret
        run: |
          echo "${{ secrets.ENV_CONFIG }}" > .env
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          sed -i '/BACKEND_IMAGE/d' .env 
          echo "BACKEND_IMAGE=${{ env.REGISTRY }}/${REPO}-backend:latest" >> .env
          echo "PYTHONPATH=/app" >> .env

      - name: 🚀 Final Deploy via Native SSH
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOSTNAME: ${{ secrets.EC2_HOST }}
          USER_NAME: ${{ secrets.EC2_USER }}
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY_USER: ${{ github.actor }}
          # Truyền trực tiếp tên Image vào bước deploy để chắc chắn
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "$PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          B_IMAGE="${{ env.REGISTRY }}/${REPO}-backend:latest"
          
          echo "📡 Kết nối tới $HOSTNAME..."
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa $USER_NAME@$HOSTNAME "mkdir -p ~/app"
          
          echo "📤 Đang chuyển file .env và docker-compose..."
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa .env docker-compose.yml $USER_NAME@$HOSTNAME:~/app/
          
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa $USER_NAME@$HOSTNAME << EOF
            cd ~/app
            
            # 1. Đăng nhập vào Registry (Sử dụng biến truyền từ GitHub)
            echo "$REGISTRY_PASSWORD" | sudo docker login ghcr.io -u "$REGISTRY_USER" --password-stdin

            # 2. Ép tải Image mới nhất dùng tên biến cụ thể
            echo "📥 Đang tải Image mới: $B_IMAGE"
            BACKEND_IMAGE=$B_IMAGE sudo docker compose pull
            
            # 3. Khởi động TOÀN BỘ các dịch vụ cùng lúc
            echo "� Đang khởi động hệ thống (Backend, Bot, DB, Redis, Worker)..."
            BACKEND_IMAGE=$B_IMAGE sudo docker compose up -d --remove-orphans
            
            echo "⏳ Đợi 15 giây để Database sẵn sàng..."
            sleep 15
            
            # 4. Chạy Migration bên trong container đang chạy (An toàn hơn)
            echo "🔄 Cập nhật Database Schema (nếu cần)..."
            sudo docker compose exec -T backend alembic upgrade head || echo "⚠️ Cảnh báo: Không thể chạy migration tự động, hãy kiểm tra log sau."
            
            # 5. Dọn dẹp rác
            sudo docker image prune -f
            
            echo "✅ TRẠNG THÁI HỆ THỐNG:"
            sudo docker compose ps
            
            echo "✨ DEPLOY HOÀN TẤT!"
            sudo docker logout ghcr.io
          EOF
