name: Deploy to EC2 (Optimized)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase repo name
        run: |
          echo "REPO_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]' | cut -d'/' -f2)" >> $GITHUB_ENV
          echo "IMAGE_TAG=crypto-backend:latest" >> $GITHUB_ENV

      - name: Build Docker image locally
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true # Load image vào docker local của GitHub Runner thay vì push
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save and Compress Docker image
        run: |
          echo "📦 Đang nén Image..."
          docker save ${{ env.IMAGE_TAG }} | gzip > backend_image.tar.gz
          echo "✅ Đã nén thành backend_image.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: backend_image.tar.gz
          retention-days: 1

  deploy:
    needs: build-and-package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Create .env file
        run: |
          echo "${{ secrets.ENV_CONFIG }}" > .env
          echo "BACKEND_IMAGE=crypto-backend:latest" >> .env
          echo "PYTHONPATH=/app" >> .env

      - name: 🚀 Final Deploy via Docker Load
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOSTNAME: ${{ secrets.EC2_HOST }}
          USER_NAME: ${{ secrets.EC2_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Cấu hình SSH chuẩn (không debug)
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=60 -o ServerAliveInterval=15 -i ~/.ssh/id_rsa"
          
          echo "📡 Đang kết nối tới $HOSTNAME..."
          ssh $SSH_OPTS $USER_NAME@$HOSTNAME "mkdir -p ~/app"

          echo "📤 Đang đẩy Image và cấu hình lên Server..."
          scp $SSH_OPTS backend_image.tar.gz .env docker-compose.yml $USER_NAME@$HOSTNAME:~/app/
          
          echo "⚙️ Đang thực thi lệnh triển khai trên Server..."
          ssh $SSH_OPTS $USER_NAME@$HOSTNAME 'bash -s' << 'EOF'
            cd ~/app
            
            # 0. Tự động xử lý SWAP cho server 1GB RAM (Bảo hiểm cho OOM)
            echo "🧠 Kiểm tra RAM ảo (Swap)..."
            if [ $(free -m | grep Swap | awk '{print $2}') -lt 1024 ]; then
                echo "⚠️ Thiếu Swap, đang tự động tạo file Swap 2GB để tránh treo máy..."
                sudo fallocate -l 2G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=2048
                sudo chmod 600 /swapfile
                sudo mkswap /swapfile
                sudo swapon /swapfile
                echo "✅ Đã kích hoạt 2GB Swap."
            else
                echo "✅ Swap đã sẵn sàng."
            fi

            echo "📥 1. Nạp Image vào hệ thống..."
            gunzip -c backend_image.tar.gz | sudo docker load
            
            echo "🧹 2. Dọn dẹp hệ thống cũ..."
            sudo docker compose down --remove-orphans || true
            rm backend_image.tar.gz
            
            echo "🗄️ 3. Khởi động Database & Redis..."
            sudo docker compose up -d db redis
            echo "⏳ Đợi 10 giây để DB sẵn sàng..."
            sleep 10
            
            echo "🔄 4. Chạy Database Migrations (Sử dụng Swap)..."
            # Dùng --no-deps để tiết kiệm RAM tối đa
            sudo docker compose run --rm --no-deps backend alembic upgrade head || echo "⚠️ Migration gặp lỗi nhẹ."
            echo "✅ Bước 4 hoàn tất."

            echo "🚀 5. Khởi động Backend..."
            sudo docker compose up -d backend
            echo "⏳ Đợi 40 giây (Nạp Pandas/TA-Lib)..."
            sleep 40
            
            echo "🤖 6. Khởi động các dịch vụ còn lại (Celery, Bot)..."
            sudo docker compose up -d celery_worker telegram_bot celery_beat
            
            echo "🧹 7. Dọn dẹp tài nguyên thừa..."
            sudo docker system prune -f
            
            echo "🚀 DEPLOY HOÀN TẤT!"
            sudo docker compose ps
            free -m
          EOF
